name: Smartin Weekly Broadcast

on:
  schedule:
    # Run every Saturday at 12:00 UTC (8:00 AM EST)
    - cron: '0 12 * * 6'
  workflow_dispatch: # Allows manual trigger from GitHub UI for testing

jobs:
  run-weekly-broadcast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run Weekly Broadcast Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python scripts/weekly_broadcast.py
