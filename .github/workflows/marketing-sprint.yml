name: Autonomous Marketing Sprint

on:
  schedule:
    # Standard Sprint: 10:00 AM EST (14:00 UTC) Mon, Wed, Fri
    - cron: '0 14 * * 1,3,5'
    # Monday Forecast: 08:00 AM EST (12:00 UTC) Monday
    - cron: '0 12 * * 1'
    # Friday Performance: 05:00 PM EST (21:00 UTC) Friday
    - cron: '0 21 * * 5'
  workflow_dispatch:
    inputs:
      type:
        description: 'Type of sprint to run'
        required: true
        default: 'standard'
        type: choice
        options:
          - standard
          - forecast
          - performance

jobs:
  generate-sprint:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai tweepy yfinance pandas

      - name: Run Gemini Headless Agent
        env:
          GEMINI_API_KEY: ${{ secrets.SMARTIN_GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TYPE="${{ github.event.inputs.type }}"
          elif [[ "${{ github.event.schedule }}" == "0 12 * * 1" ]]; then
            TYPE="forecast"
          elif [[ "${{ github.event.schedule }}" == "0 21 * * 5" ]]; then
            TYPE="performance"
          else
            TYPE="standard"
          fi
          
          echo "Running $TYPE sprint..."
          if [[ "$TYPE" == "forecast" ]]; then
            python scripts/market_forecast.py
          elif [[ "$TYPE" == "performance" ]]; then
            python scripts/weekly_performance.py
          else
            python scripts/autonomous_sprint.py
          fi

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _posts/*.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated Marketing Sprint (${{ github.event.inputs.type || 'scheduled' }})"
          git push

